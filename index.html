<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Gyani - YouTube Tips & Tech</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
      line-height: 1.6;
    }

    header {
      background: #111827;
      padding: 20px;
      text-align: center;
      border-bottom: 2px solid #2563eb;
    }

    header h1 {
      font-size: 40px;
      color: #60a5fa;
    }

    header p {
      margin-top: 10px;
      color: #cbd5e1;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 15px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
    }

    .hero h2 {
      font-size: 45px;
      margin-bottom: 20px;
      color: #93c5fd;
    }

</html>
